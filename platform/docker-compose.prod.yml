services:
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - coolify
    restart: unless-stopped

  api:
    build:
      context: platform
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN}
      - REDIS_URL=${REDIS_URL}
      - WATI_API_URL=${WATI_API_URL:-}
      - WATI_API_TOKEN=${WATI_API_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin:
    build:
      context: platform/apps/admin-console
      dockerfile: Dockerfile
      args:
        # Points /api requests to the API gateway on the same Coolify network.
        # Override with your actual domain when deploying behind nginx.
        VITE_API_URL: "/api"
    ports:
      - "3001:80"
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - api

  worker:
    build:
      context: platform
      dockerfile: Dockerfile
    command: celery -A services.campaigns.app.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN}
      - REDIS_URL=${REDIS_URL}
      - WATI_API_URL=${WATI_API_URL:-}
      - WATI_API_TOKEN=${WATI_API_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - api
      - redis

  beat:
    build:
      context: platform
      dockerfile: Dockerfile
    command: celery -A services.campaigns.app.celery_app.celery_app beat --loglevel=info
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN}
      - REDIS_URL=${REDIS_URL}
      - WATI_API_URL=${WATI_API_URL:-}
      - WATI_API_TOKEN=${WATI_API_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - api
      - redis

networks:
  coolify:
    external: true
