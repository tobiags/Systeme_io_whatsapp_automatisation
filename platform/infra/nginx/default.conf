# nginx reverse proxy — routes /api to the gateway, / to the admin console
# Used for local docker-compose.yml setups.

upstream api_gateway {
    server api:8000;
}

upstream admin_console {
    server admin:80;
}

server {
    listen 80;
    server_name _;

    # All API traffic → FastAPI gateway (strips /api prefix)
    location /api/ {
        proxy_pass http://api_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Admin console (SPA, built by Vite)
    location / {
        proxy_pass http://admin_console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
